# Mutation testing for the Angular diagnostics-web frontend (StrykerJS).
#
# Runs the Jest unit suite, then Stryker mutation analysis, and publishes a
# compact Markdown summary to the run's job summary plus the full HTML/JSON
# report as an artifact. Informational only: continue-on-error keeps it from
# blocking merges while the suite's mutation score is brought up.
name: mutation-web

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'diagnostics-web/**'
      - '.github/workflows/mutation-web.yml'
      - 'scripts/summarize-stryker.ps1'

jobs:
  stryker-web:
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: diagnostics-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: diagnostics-web/package-lock.json

      - run: npm ci

      - name: Unit tests
        run: npm test -- --runInBand

      - name: Mutation tests
        run: npm run test:mutation

      - name: Summarize mutation report
        if: always()
        shell: pwsh
        run: |
          ../scripts/summarize-stryker.ps1 `
            -ReportPath reports/mutation/mutation.json `
            -JsonOutputPath reports/mutation/mutation-summary.json `
            -MarkdownOutputPath reports/mutation/mutation-summary.md |
            Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutation-web-report
          path: diagnostics-web/reports/mutation/**
