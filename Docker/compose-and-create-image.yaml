# Builds the diagnostic-explorer image locally from ../Docker/Dockerfile
# and brings it up alongside a MongoDB container.
#
# Run from the repo root:
#   docker compose -f Docker/compose-and-create-image.yaml up -d --build
#
# Environment variable overrides (set in your shell or a sibling .env file):
#   MONGO_USERNAME           - mongo root user           (default: admin)
#   MONGO_PASSWORD           - mongo root password       (REQUIRED — no default)
#   DIAGEXPLORER_HOST_PORT   - host-side port for 2803   (default: 2803)
#                              Override (e.g. 2903) if another process on
#                              the host is already bound to 2803 -- for
#                              instance a native DiagnosticExplorer.Service
#                              running outside Docker.

name: diagnostic-explorer

services:
  mongodb:
    image: mongo:7.0.14
    container_name: diagnostic-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:?MONGO_PASSWORD must be set}
      MONGO_INITDB_DATABASE: diagnostic_db
    ports:
      # Bound to loopback only: the app reaches Mongo over the internal diagnostic-network,
      # so the host mapping is for local tooling, not for exposing the DB to the network.
      - "127.0.0.1:27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - diagnostic-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok", "mongodb://localhost:27017/admin"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  diagnostic-explorer:
    build:
      context: ..
      dockerfile: Docker/Dockerfile
    image: diagnostic-explorer:local
    container_name: diagnostic-service
    restart: unless-stopped
    ports:
      - "${DIAGEXPLORER_HOST_PORT:-2803}:2803"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:2803
      - DiagServiceSettings__RetroConnection=mongodb://${MONGO_USERNAME:-admin}:${MONGO_PASSWORD:?MONGO_PASSWORD must be set}@mongodb:27017/diagnostic_db?authSource=admin
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - diagnostic-network

volumes:
  mongodb_data:
  mongodb_config:

networks:
  diagnostic-network:
    driver: bridge
