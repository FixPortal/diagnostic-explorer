name: diagnostic-explorer
services:
  mongodb:
    image: mongo:7.0
    container_name: diagnostic-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: diagnostic_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - diagnostic-network
      
  diagnostic-explorer:
    image: destructivedude/diagnostic_explorer
    container_name: diagnostic-service
    restart: unless-stopped
    ports:      
      - "2803:2803"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5001
      - ASPNETCORE_HTTP_PORTS=5001
      - ASPNETCORE_HTTPS_PORTS=
      - ConnectionStrings__MongoDB=mongodb://admin:password123@mongodb:27017/diagnostic_db?authSource=admin
    depends_on:
      - mongodb
    networks:
      - diagnostic-network
        
volumes:
  mongodb_data:
  mongodb_config:

networks:
  diagnostic-network:
    driver: bridge

